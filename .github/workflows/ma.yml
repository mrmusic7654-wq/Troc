name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.3.1

      - name: Create dummy env file
        run: touch .env.example

      - name: Create dummy google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "com.aistudio.troc.chatxi"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "dummy_key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Debug - Show raw bytes of XML files
        run: |
          echo "=== ic_launcher_foreground.xml ==="
          head -c 100 app/src/main/res/drawable/ic_launcher_foreground.xml | xxd
          echo "=== splash_background.xml ==="
          head -c 100 app/src/main/res/drawable/splash_background.xml | xxd
          echo "=== backup_rules.xml ==="
          head -c 100 app/src/main/res/xml/backup_rules.xml | xxd
          echo "=== data_extraction_rules.xml ==="
          head -c 100 app/src/main/res/xml/data_extraction_rules.xml | xxd

      - name: Force rewrite XML files without BOM
        run: |
          for f in $(find app/src/main/res -name "*.xml" -type f); do
            echo "Fixing: $f"
            tail -c +4 "$f" > "$f.tmp" 2>/dev/null
            if [ -s "$f.tmp" ]; then
              echo '<?xml version="1.0" encoding="utf-8"?>' > "$f"
              cat "$f.tmp" >> "$f"
              rm "$f.tmp"
            fi
          done

      - name: Debug - Verify fix
        run: |
          echo "=== ic_launcher_foreground.xml ==="
          head -c 100 app/src/main/res/drawable/ic_launcher_foreground.xml | xxd

      - name: Fix GEMINI_API_KEY reference
        run: sed -i 's/BuildConfig.GEMINI_API_KEY/"dummy_key"/g' app/src/main/java/com/example/ui/viewmodel/ChatViewModel.kt

      - name: Fix signing config
        run: |
          sed -i '/signingConfigs {/,/^  }/d' app/build.gradle.kts
          sed -i 's/signingConfig = signingConfigs.getByName("release")//' app/build.gradle.kts
          sed -i 's/signingConfig = signingConfigs.getByName("debugConfig")//' app/build.gradle.kts

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: troc
          path: app/build/outputs/apk/debug/app-debug.apk
